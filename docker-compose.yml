services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: phpkanmaster_app
    restart: unless-stopped
    environment:
      TZ: America/New_York
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      db:
        condition: service_healthy
      postgrest:
        condition: service_started
    networks:
      - phpkanmaster

  db:
    image: postgres:17
    container_name: phpkanmaster_db
    restart: unless-stopped
    environment:
      TZ: America/New_York
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kanban_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - phpkanmaster

  postgrest:
    image: postgrest/postgrest:latest
    container_name: phpkanmaster_postgrest
    restart: unless-stopped
    environment:
      TZ: America/New_York
      PGRST_DB_URI: postgres://kanban_postgrest:${POSTGREST_PASSWORD:-postgrest_secret}@db:5432/kanban
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_SERVER_PORT: 3000
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - phpkanmaster
    # No ports exposed — accessed only via Caddy

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: phpkanmaster_scheduler
    restart: unless-stopped
    environment:
      TZ: America/New_York
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      db:
        condition: service_healthy
      postgrest:
        condition: service_started
    networks:
      - phpkanmaster

  backup:
    build:
      context: ./docker/db
      dockerfile: Dockerfile.backup
    container_name: phpkanmaster_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      TZ: America/New_York
      PGPASSWORD: ${DB_PASSWORD:-kanban_secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - phpkanmaster

  sse:
    build:
      context: ./docker/sse
      dockerfile: Dockerfile
    container_name: phpkanmaster_sse
    restart: unless-stopped
    environment:
      TZ: America/New_York
      SSE_DATABASE_URL: 'pgsql:host=db;port=5432;dbname=kanban'
      SSE_DB_USER: kanban
      SSE_DB_PASSWORD: ${DB_PASSWORD:-kanban_secret}
      SSE_PORT: 8080
      SSE_HEARTBEAT: 30
    depends_on:
      db:
        condition: service_healthy
    networks:
      - phpkanmaster

  caddy:
    image: caddy:latest
    container_name: phpkanmaster_caddy
    restart: unless-stopped
    environment:
      TZ: America/New_York
    ports:
      - "8181:80"
      - "8443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./:/var/www/html
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - postgrest
      - sse
    networks:
      - phpkanmaster

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  phpkanmaster:
    driver: bridge
