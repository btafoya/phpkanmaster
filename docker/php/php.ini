; docker/php/php.ini
; Custom PHP configuration for phpKanMaster

memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 60
max_input_time = 60

; Error reporting (adjust for production)
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Timezone
date.timezone = UTC
